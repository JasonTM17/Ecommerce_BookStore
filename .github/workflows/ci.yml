name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  MYSQL_VERSION: "8.0"

jobs:
  # ===========================================
  # Backend Tests
  # ===========================================
  backend-test:
    name: Backend Test (MySQL ${{ env.MYSQL_VERSION }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:${{ env.MYSQL_VERSION }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bookstore_test
          MYSQL_USER: bookstore
          MYSQL_PASSWORD: bookpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h localhost -u root -proot --silent && break
            sleep 2
          done

      - name: Run Backend Tests
        run: |
          cd Backend_Java
          mvn clean test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/bookstore_test \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root \
            -DskipFrontendBuild=true

      - name: Upload Backend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: Backend_Java/target/surefire-reports/
          retention-days: 7

      - name: Generate Backend Coverage Report
        run: |
          cd Backend_Java
          mvn jacoco:report -DskipTests=true

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Backend_Java/target/site/jacoco/

  # ===========================================
  # Frontend Tests
  # ===========================================
  frontend-test:
    name: Frontend Test (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd Frontend_NextJS
          npm ci

      - name: Run Frontend Unit Tests
        run: |
          cd Frontend_NextJS
          npm run test:run -- --reporter=verbose

      - name: Upload Frontend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            Frontend_NextJS/coverage/
            Frontend_NextJS/src/test-results/
          retention-days: 7

      - name: Run Frontend Coverage
        run: |
          cd Frontend_NextJS
          npm run test:coverage -- --reporter=verbose

  # ===========================================
  # Frontend Build
  # ===========================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Install Dependencies
        run: |
          cd Frontend_NextJS
          npm ci

      - name: Build Frontend
        run: |
          cd Frontend_NextJS
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend_NextJS/.next/
          retention-days: 7

  # ===========================================
  # E2E Tests (Playwright)
  # ===========================================
  e2e-test:
    name: E2E Test (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Install Dependencies
        run: |
          cd Frontend_NextJS
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd Frontend_NextJS
          npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: |
          cd Frontend_NextJS
          npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            Frontend_NextJS/playwright-report/
            Frontend_NextJS/test-results/
          retention-days: 7

      - name: Upload Playwright Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: Frontend_NextJS/test-results/
          retention-days: 7

  # ===========================================
  # Code Quality Checks
  # ===========================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Run Backend Linter
        run: |
          cd Backend_Java
          mvn checkstyle:check -q

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Run Frontend Linter
        run: |
          cd Frontend_NextJS
          npm run lint

  # ===========================================
  # Security Scan
  # ===========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # ===========================================
  # Deploy to Staging (on push to develop)
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, code-quality]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging Server
        run: |
          echo "Deploy staging workflow triggered"
          # Add your deployment commands here
          # Example: ./deploy.sh staging

  # ===========================================
  # Deploy to Production (on push to master)
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test, code-quality, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        run: |
          echo "Deploy production workflow triggered"
          # Add your deployment commands here
          # Example: ./deploy.sh production
