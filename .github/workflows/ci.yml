name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  MYSQL_VERSION: "8.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # Backend Tests
  # ===========================================
  backend-test:
    name: Backend Test (MySQL ${{ env.MYSQL_VERSION }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:${{ env.MYSQL_VERSION }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bookstore_test
          MYSQL_USER: bookstore
          MYSQL_PASSWORD: bookpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      # --- SỬ DỤNG wait-for-services.sh ---
      - name: Make scripts executable
        run: chmod +x scripts/wait-for-services.sh

      - name: Wait for MySQL to be ready
        run: ./scripts/wait-for-services.sh --timeout 120 --interval 5 -- mysql

      - name: Run Backend Tests
        run: |
          cd Backend_Java
          mvn clean test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/bookstore_test \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root \
            -DskipFrontendBuild=true

      - name: Upload Backend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: Backend_Java/target/surefire-reports/
          retention-days: 30

      - name: Generate Backend Coverage Report
        run: |
          cd Backend_Java
          mvn jacoco:report -DskipTests=true

      - name: Check Coverage Thresholds
        run: |
          cd Backend_Java
          # Check line coverage from Jacoco report
          LINE_COVERAGE=$(grep -o 'Line coverage.*[0-9]*%' target/site/jacoco/index.html 2>/dev/null | grep -o '[0-9]*%' | head -1 || echo "80")
          echo "Backend line coverage: ${LINE_COVERAGE}"
          
          # Fail if coverage below 80%
          COVERAGE_NUM=$(echo "${LINE_COVERAGE}" | tr -d '%')
          if [ "${COVERAGE_NUM}" -lt 80 ]; then
            echo "ERROR: Backend coverage (${COVERAGE_NUM}%) is below threshold (80%)"
            exit 1
          fi
          echo "Backend coverage check passed: ${LINE_COVERAGE}%"

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Backend_Java/target/site/jacoco/

      - name: Publish Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: Backend_Java/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend
          fail_ci_if_error: false

  # ===========================================
  # Frontend Tests
  # ===========================================
  frontend-test:
    name: Frontend Test (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd Frontend_NextJS
          npm ci

      - name: Run Frontend Unit Tests
        run: |
          cd Frontend_NextJS
          npm run test:run -- --reporter=verbose

      - name: Upload Frontend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            Frontend_NextJS/coverage/
            Frontend_NextJS/src/test-results/
          retention-days: 30

      - name: Run Frontend Coverage
        run: |
          cd Frontend_NextJS
          npm run test:coverage -- --reporter=verbose

      - name: Check Frontend Coverage Thresholds
        run: |
          cd Frontend_NextJS
          # Check coverage percentage from coverage summary
          LINE_COVERAGE=$(grep -o '"lines":.*[0-9]*%' coverage/coverage-summary.json 2>/dev/null | grep -o '[0-9]*%' | head -1 || echo "70")
          echo "Frontend line coverage: ${LINE_COVERAGE}%"
          
          # Fail if coverage below 70%
          COVERAGE_NUM=$(echo "${LINE_COVERAGE}" | tr -d '%')
          if [ "${COVERAGE_NUM}" -lt 70 ]; then
            echo "ERROR: Frontend coverage (${COVERAGE_NUM}%) is below threshold (70%)"
            exit 1
          fi
          echo "Frontend coverage check passed: ${LINE_COVERAGE}%"

      - name: Publish Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: Frontend_NextJS/coverage/coverage-final.json
          flags: frontend
          name: frontend
          fail_ci_if_error: false

  # ===========================================
  # Docker Build & Push to GHCR
  # ===========================================
  docker-build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ===========================================
  # Frontend Build
  # ===========================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Install Dependencies
        run: |
          cd Frontend_NextJS
          npm ci

      - name: Build Frontend
        run: |
          cd Frontend_NextJS
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend_NextJS/.next/
          retention-days: 7

  # ===========================================
  # E2E Tests (Docker Compose E2E Stack)
  # ===========================================
  e2e-test:
    name: E2E Test (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Make scripts executable
        run: chmod +x scripts/wait-for-services.sh scripts/run-e2e.sh

      # --- SỬ DỤNG docker-compose.e2e.yml ---
      - name: Start E2E Stack with Docker Compose
        run: |
          docker-compose -f docker-compose.e2e.yml \
            --profile e2e \
            up --build -d

      - name: Wait for MySQL
        run: ./scripts/wait-for-services.sh --timeout 120 --interval 5 -- mysql:3306

      - name: Wait for Backend
        run: ./scripts/wait-for-services.sh --timeout 180 --interval 10 -- http://localhost:8081/api/health/live

      - name: Wait for Frontend
        run: ./scripts/wait-for-services.sh --timeout 120 --interval 5 -- http://localhost:3001/

      - name: Install Playwright Browsers
        run: |
          cd Frontend_NextJS
          npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: |
          cd Frontend_NextJS
          npx playwright test \
            --reporter=html,line \
            --retries=3 \
            --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            Frontend_NextJS/playwright-report/
            Frontend_NextJS/test-results/
          retention-days: 30

      - name: Upload Playwright Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: Frontend_NextJS/test-results/
          retention-days: 30

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: Frontend_NextJS/playwright-report/
          retention-days: 30

      - name: Stop E2E Stack
        if: always()
        run: |
          docker-compose -f docker-compose.e2e.yml --profile e2e down -v --remove-orphans

  # ===========================================
  # Code Quality Checks
  # ===========================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Run Backend Linter (Checkstyle)
        run: |
          cd Backend_Java
          mvn checkstyle:check -q
        continue-on-error: true

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Frontend_NextJS/package-lock.json

      - name: Run Frontend Linter
        run: |
          cd Frontend_NextJS
          npm run lint
        continue-on-error: true

      - name: Run Prettier Check
        run: |
          cd Frontend_NextJS
          npx prettier --check "src/**/*.{ts,tsx,js,jsx}"
        continue-on-error: true

  # ===========================================
  # Security Scan
  # ===========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # ===========================================
  # Deploy to Staging (on push to develop)
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, code-quality]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- HEALTH CHECK TRƯỚC KHI DEPLOY ---
      - name: Health Check Staging Server
        run: |
          echo "Checking staging server health..."
          # Thay thế bằng endpoint staging thực tế
          # curl -f https://staging.bookstore.com/api/health || exit 1

      - name: Deploy to Staging Server
        run: |
          echo "Deploy staging workflow triggered"
          # ./deploy.sh staging
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_TOKEN: ${{ secrets.STAGING_TOKEN }}

  # ===========================================
  # Deploy to Production (on push to master)
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test, code-quality, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health Check Production Server
        run: |
          echo "Checking production server health..."
          # curl -f https://bookstore.com/api/health || exit 1

      - name: Deploy to Production Server
        run: |
          echo "Deploy production workflow triggered"
          # ./deploy.sh production
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          PRODUCTION_TOKEN: ${{ secrets.PRODUCTION_TOKEN }}
