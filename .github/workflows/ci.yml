name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend-test:
    name: Backend Test (MySQL 8.0)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bookstore_test
          MYSQL_USER: bookstore
          MYSQL_PASSWORD: bookpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Make scripts executable
        run: chmod +x scripts/wait-for-services.sh

      - name: Wait for MySQL TCP port
        run: ./scripts/wait-for-services.sh --timeout 180 --interval 5 127.0.0.1:3306

      - name: Debug MySQL runner state on failure
        if: failure()
        run: |
          docker ps -a
          sudo ss -ltnp || true

      - name: Run backend tests
        run: |
          cd backend
          mvn clean test \
            -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/bookstore_test \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root \
            -DskipFrontendBuild=true

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 30

      - name: Generate backend coverage report
        run: |
          cd backend
          mvn jacoco:report -DskipTests=true

      - name: Check backend coverage thresholds
        run: |
          cd backend
          LINE_COVERAGE=$(awk -F, 'NR > 1 { missed += $8; covered += $9 } END { total = missed + covered; if (total == 0) print 0; else printf "%.0f", (covered / total) * 100 }' target/site/jacoco/jacoco.csv)
          echo "Backend line coverage: ${LINE_COVERAGE}%"

          if [ "${LINE_COVERAGE}" -lt 50 ]; then
            echo "ERROR: Backend coverage (${LINE_COVERAGE}%) is below threshold (50%)"
            exit 1
          fi

          echo "Backend coverage check passed: ${LINE_COVERAGE}%"

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: Publish backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend
          fail_ci_if_error: false

  frontend-test:
    name: Frontend Test (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test:run -- --reporter=verbose

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/coverage/
            frontend/src/test-results/
          retention-days: 30

      - name: Run frontend coverage
        run: |
          cd frontend
          npm run test:coverage -- --reporter=verbose

      - name: Check frontend coverage thresholds
        run: |
          cd frontend
          LINE_COVERAGE=$(node -e "const fs=require('fs'); const file='coverage/coverage-summary.json'; if (!fs.existsSync(file)) { process.stdout.write('0'); process.exit(0); } const summary=JSON.parse(fs.readFileSync(file, 'utf8')); process.stdout.write(String(Math.floor(summary.total.lines.pct || 0)));")
          echo "Frontend line coverage: ${LINE_COVERAGE}%"

          if [ "${LINE_COVERAGE}" -lt 15 ]; then
            echo "ERROR: Frontend coverage (${LINE_COVERAGE}%) is below threshold (15%)"
            exit 1
          fi

          echo "Frontend coverage check passed: ${LINE_COVERAGE}%"

      - name: Publish frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend
          fail_ci_if_error: false

  docker-build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7

  e2e-test:
    name: E2E Test (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Make scripts executable
        run: chmod +x scripts/wait-for-services.sh scripts/run-e2e.sh

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Start E2E stack with Docker Compose
        run: |
          docker compose -f docker-compose.e2e.yml \
            --profile e2e \
            up --build -d

      - name: Wait for MySQL
        run: ./scripts/wait-for-services.sh --timeout 180 --interval 5 127.0.0.1:3307

      - name: Wait for backend
        run: ./scripts/wait-for-services.sh --timeout 180 --interval 10 http://127.0.0.1:8081/api/actuator/health/liveness

      - name: Wait for frontend
        run: ./scripts/wait-for-services.sh --timeout 120 --interval 5 http://127.0.0.1:3001/

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright portfolio smoke
        run: |
          cd frontend
          npm run test:e2e:portfolio -- --reporter=html,line --retries=3
        env:
          BASE_URL: http://localhost:3001
          API_URL: http://localhost:3001/api
          PLAYWRIGHT_BASE_URL: http://localhost:3001

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30

      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Stop E2E stack
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml --profile e2e down -v --remove-orphans

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run backend linter (Checkstyle)
        run: |
          cd backend
          mvn checkstyle:check -q
        continue-on-error: true

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend linter
        run: |
          cd frontend
          npm run lint
        continue-on-error: true

      - name: Run Prettier check
        run: |
          cd frontend
          npx prettier --check "src/**/*.{ts,tsx,js,jsx}"
        continue-on-error: true

  security:
    name: Security Scan
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, code-quality]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health check staging server
        run: |
          echo "Checking staging server health..."
          # curl -f https://staging.bookstore.com/api/health || exit 1

      - name: Deploy to staging server
        run: |
          echo "Deploy staging workflow triggered"
          # ./deploy.sh staging
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_TOKEN: ${{ secrets.STAGING_TOKEN }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test, code-quality, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health check production server
        run: |
          echo "Checking production server health..."
          # curl -f https://bookstore.com/api/health || exit 1

      - name: Deploy to production server
        run: |
          echo "Deploy production workflow triggered"
          # ./deploy.sh production
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          PRODUCTION_TOKEN: ${{ secrets.PRODUCTION_TOKEN }}
