# ==============================================================================
# render.yaml - Render Blueprint (Infrastructure as Code)
#
# Deploy full-stack BookStore to Render.com:
#   1. PostgreSQL Database (free tier)
#   2. Spring Boot Backend (Docker)
#   3. Next.js Frontend (Docker)
#
# Usage:
#   1. Push this file to GitHub
#   2. Render Dashboard > New > Blueprint > Connect repo
#   3. Apply Blueprint
# ==============================================================================

databases:
  - name: bookstore-db
    plan: free
    databaseName: bookstore
    user: bookstore
    region: singapore

services:
  # --------------------------------------------------------------------------
  # Backend - Spring Boot API (Docker)
  # --------------------------------------------------------------------------
  - type: web
    name: bookstore-api
    plan: free
    region: singapore
    runtime: docker
    autoDeployTrigger: off
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /api/health/live
    envVars:
      # Spring profile
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # Database - primary: DATABASE_URL is parsed by RenderDataSourceConfig
      - key: DATABASE_URL
        fromDatabase:
          name: bookstore-db
          property: connectionString
      # Database - fallback individual vars (used if DATABASE_URL parsing fails)
      - key: DB_HOST
        fromDatabase:
          name: bookstore-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bookstore-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: bookstore-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bookstore-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bookstore-db
          property: password
      # JPA
      - key: JPA_DDL_AUTO
        value: update
      # JWT
      - key: JWT_SECRET
        generateValue: true
      # CORS - will be updated after frontend deploys
      - key: CORS_ORIGINS
        value: https://bookstore-web-dr1k.onrender.com
      # App
      - key: APP_BASE_URL
        value: https://bookstore-web-dr1k.onrender.com
      - key: BACKEND_PUBLIC_URL
        value: https://bookstore-api-a1xl.onrender.com
      - key: APP_DEMO_SEED_ENABLED
        value: "true"
      - key: APP_DEMO_SEED_DEFERRED
        value: "true"
      - key: APP_DEMO_ADMIN_PASSWORD
        generateValue: true
      - key: APP_DEMO_MANAGER_PASSWORD
        generateValue: true
      - key: APP_DEMO_CUSTOMER_PASSWORD
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads
      # Rate Limiting
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_AUTH_LIMIT
        value: "10"
      - key: RATE_LIMIT_API_LIMIT
        value: "200"
      - key: RATE_LIMIT_PUBLIC_LIMIT
        value: "500"
      # Email - disabled by default
      - key: APP_EMAIL_TEST_ENABLED
        value: "false"
      # Grok AI - disabled by default
      - key: GROK_ENABLED
        value: "false"

  # --------------------------------------------------------------------------
  # Frontend - Next.js Application (Docker)
  # --------------------------------------------------------------------------
  - type: web
    name: bookstore-web
    plan: free
    region: singapore
    runtime: docker
    autoDeployTrigger: off
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: BACKEND_HOSTPORT
        fromService:
          type: web
          name: bookstore-api
          property: hostport
      # API proxy to backend
      - key: API_PROXY_TARGET
        value: https://bookstore-api-a1xl.onrender.com/api
      - key: API_PROXY_TIMEOUT_MS
        value: "65000"
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: NEXT_PUBLIC_APP_NAME
        value: BookStore
      - key: NEXT_PUBLIC_APP_DESCRIPTION
        value: "Professional Vietnamese E-Commerce BookStore Platform"
      - key: NEXT_PUBLIC_BASE_URL
        value: https://bookstore-web-dr1k.onrender.com
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NODE_ENV
        value: production
