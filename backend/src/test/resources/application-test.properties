spring.application.name=Ecommerce-BookStore-Test

# Avoid @Scheduled jobs (e.g. password reset cleanup) during tests
spring.task.scheduling.enabled=false

# Align with main app so MockMvc and integration tests hit the same paths
server.servlet.context-path=/api

# H2 Database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway during tests (using H2 in-memory DB)
spring.flyway.enabled=false

# JWT
jwt.secret=TestSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLongForTestingPurpose!
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Mail (avoid MailSender validation failures when the full context starts)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
grok.enabled=false
