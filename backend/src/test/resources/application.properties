# Test Configuration - Override main application.properties

# ===========================================
# Database Configuration (H2 for tests)
# ===========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===========================================
# Disable Flyway during tests (H2 doesn't support MySQL syntax)
# ===========================================
spring.flyway.enabled=false

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=TestSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLongForTestingPurpose!
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===========================================
# Mail Configuration (mock)
# ===========================================
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false

# ===========================================
# Disable scheduling during tests
# ===========================================
spring.task.scheduling.enabled=false

# ===========================================
# Disable rate limiting during tests
# ===========================================
app.rate-limit.enabled=false

# ===========================================
# Newsletter disabled during tests
# ===========================================
app.newsletter.enabled=false

# ===========================================
# File Upload Configuration
# ===========================================
app.upload.dir=/tmp/test-uploads
app.upload.base-url=http://localhost:8080/api/uploads
grok.enabled=false
