spring.application.name=Ecommerce-BookStore-IntegrationTest

# Align with main app
server.servlet.context-path=/api

# Integration tests default to H2 locally, but the driver is inferred from the URL.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway during tests (using H2 in-memory DB)
spring.flyway.enabled=false

# JWT
jwt.secret=TestSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLongForTestingPurpose!
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Disable scheduling during tests
spring.task.scheduling.enabled=false

# Integration tests rely on demo users/catalog; use test-only passwords.
app.demo-seed.enabled=true
app.demo-seed.deferred=false
app.demo-seed.admin-password=IntegrationTestDemoAdminPasswordForBookStore123!
app.demo-seed.manager-password=IntegrationTestDemoManagerPasswordForBookStore123!
app.demo-seed.customer-password=IntegrationTestDemoCustomerPasswordForBookStore123!

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Rate Limiting - disabled in tests
app.rate-limit.enabled=false

# Input Validation - enabled in tests
app.input-validation.enabled=true
app.input-validation.block-xss=true
app.input-validation.block-sql-injection=true

# ===========================================
# Email Integration Test Configuration
# ===========================================
# Set these in environment or override in command line:
# - DMAIL_USERNAME=your-email@gmail.com
# - DMAIL_PASSWORD=your-app-password
# -Dspring.profiles.active=integration-test
# -Dapp.email.integration-test-enabled=true
# ===========================================

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

app.base-url=${APP_BASE_URL:http://localhost:3000}

# Enable/disable email test endpoints
app.email.test-endpoint-enabled=${APP_EMAIL_TEST_ENABLED:true}
app.email.allowed-test-recipients=${APP_EMAIL_ALLOWED_RECIPIENTS:test@example.com}
app.email.integration-test-enabled=${APP_EMAIL_INTEGRATION_ENABLED:false}

# Newsletter disabled during tests
app.newsletter.enabled=false

# Email sender name
app.email.sender-name=BookStore Test
