# Development Profile Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.bookstore=DEBUG
logging.level.org.springframework.security=DEBUG
spring.jpa.hibernate.ddl-auto=update

# ===========================================
# Email Configuration (Development)
# ===========================================
# Sử dụng credentials từ .env file
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.base-url=${APP_BASE_URL:http://localhost:3000}

# ===========================================
# Email Test Endpoints (Chỉ bật trong Dev!)
# ===========================================
app.email.test-endpoint-enabled=${APP_EMAIL_TEST_ENABLED:false}
app.email.allowed-test-recipients=${APP_EMAIL_ALLOWED_RECIPIENTS:}

# Newsletter
app.newsletter.enabled=false
app.newsletter.cron=0 0 9 ? * SUN

grok.enabled=${GROK_ENABLED:false}

