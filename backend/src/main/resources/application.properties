# ===========================================
# Server Configuration
# ===========================================
server.port=8080
server.servlet.context-path=/api

# ===========================================
# Application Name
# ===========================================
spring.application.name=Ecommerce-BookStore
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ===========================================
# Database Configuration (MySQL)
# ===========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookstore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:bookstore}
spring.datasource.password=${DB_PASSWORD:bookstore123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ===========================================
# Flyway Database Migration - Disabled (use JPA ddl-auto)
# ===========================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false

# ===========================================
# File Upload Configuration
# ===========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.base-url=${APP_BASE_URL:http://localhost:8080}/api/uploads

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong!}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===========================================
# Frontend URL (for CORS)
# ===========================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ===========================================
# Email Configuration (Optional)
# ===========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@bookstore.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App Base URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ===========================================
# Email Test Endpoints (Disable in production!)
# ===========================================
app.email.test-endpoint-enabled=${APP_EMAIL_TEST_ENABLED:false}
app.email.allowed-test-recipients=${APP_EMAIL_ALLOWED_RECIPIENTS:}

# ===========================================
# Newsletter & Scheduled Emails
# ===========================================
app.newsletter.enabled=${NEWSLETTER_ENABLED:true}
app.newsletter.cron=${NEWSLETTER_CRON:0 0 9 ? * SUN}
app.cart-reminder.cron=${CART_REMINDER_CRON:0 0 18 * * ?}
app.birthday-email.cron=${BIRTHDAY_EMAIL_CRON:0 0 8 * * ?}

# Portfolio demo seeding
app.demo-seed.enabled=${APP_DEMO_SEED_ENABLED:true}
app.demo-seed.deferred=${APP_DEMO_SEED_DEFERRED:false}

# ===========================================
# Flash Sale Automation
# ===========================================
flashsale.auto.enabled=${FLASHSALE_AUTO_ENABLED:true}
flashsale.auto.cron=${FLASHSALE_AUTO_CRON:0 5 0 ? * MON}
flashsale.auto.timezone=${FLASHSALE_AUTO_TIMEZONE:Asia/Bangkok}
flashsale.auto.batch-size=${FLASHSALE_AUTO_BATCH_SIZE:4}
flashsale.auto.discount-min=${FLASHSALE_AUTO_DISCOUNT_MIN:15}
flashsale.auto.discount-max=${FLASHSALE_AUTO_DISCOUNT_MAX:30}
flashsale.auto.stock-min=${FLASHSALE_AUTO_STOCK_MIN:20}
flashsale.auto.stock-max=${FLASHSALE_AUTO_STOCK_MAX:60}
flashsale.auto.max-per-user=${FLASHSALE_AUTO_MAX_PER_USER:2}

# ===========================================
# Logging Configuration
# ===========================================
logging.level.root=INFO
logging.level.com.bookstore=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/bookstore.log

# ===========================================
# Swagger / OpenAPI Configuration
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.enable-spring-security=true

# ===========================================
# Cache Configuration
# ===========================================
spring.cache.type=simple
spring.cache.cache-names=products,categories,users,brands

# ===========================================
# Rate Limiting Configuration
# ===========================================
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.auth-limit=${RATE_LIMIT_AUTH_LIMIT:5}
app.rate-limit.auth-window-ms=${RATE_LIMIT_AUTH_WINDOW_MS:60000}
app.rate-limit.api-limit=${RATE_LIMIT_API_LIMIT:100}
app.rate-limit.api-window-ms=${RATE_LIMIT_API_WINDOW_MS:60000}
app.rate-limit.public-limit=${RATE_LIMIT_PUBLIC_LIMIT:200}
app.rate-limit.public-window-ms=${RATE_LIMIT_PUBLIC_WINDOW_MS:60000}

# ===========================================
# Input Validation Configuration
# ===========================================
app.input-validation.enabled=${INPUT_VALIDATION_ENABLED:true}
app.input-validation.max-body-size=${INPUT_VALIDATION_MAX_BODY_SIZE:10485760}
app.input-validation.block-xss=${INPUT_VALIDATION_BLOCK_XSS:true}
app.input-validation.block-sql-injection=${INPUT_VALIDATION_BLOCK_SQL_INJECTION:true}

# ===========================================
# Actuator Configuration
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===========================================
# Grok AI Chatbot Configuration
# ===========================================
grok.enabled=${GROK_ENABLED:true}
grok.api.key=${GROK_API_KEY:}
grok.api.url=${GROK_API_URL:https://api.x.ai/v1/chat/completions}
grok.model=${GROK_MODEL:grok-3}
grok.max.context.messages=10

# ===========================================
# VNPay Configuration
# Register at: https://merchant.vnpayment.vn/
# ===========================================
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.merchant.id=${VNPAY_MERCHANT_ID:your-merchant-id}
vnpay.merchant.key=${VNPAY_MERCHANT_KEY:your-merchant-key}
vnpay.return.url=${VNPAY_RETURN_URL:http://localhost:3001/payment/return}
vnpay.ipn.url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
