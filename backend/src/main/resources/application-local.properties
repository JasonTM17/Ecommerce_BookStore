# Local Development Profile - Use with Docker MySQL
spring.config.activate.on-profile=local
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=bookstore
spring.datasource.password=bookstore123
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.bookstore=DEBUG
logging.level.org.springframework.security=DEBUG
spring.jpa.hibernate.ddl-auto=update
# Local-only fallback; production profiles require JWT_SECRET from env.
jwt.secret=${JWT_SECRET:LocalDockerJwtSecretForBookStoreOnlyWith32Bytes}
app.base-url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
grok.enabled=${GROK_ENABLED:false}
app.demo-seed.enabled=${APP_DEMO_SEED_ENABLED:true}
app.demo-seed.deferred=${APP_DEMO_SEED_DEFERRED:false}
app.demo-seed.admin-password=${APP_DEMO_ADMIN_PASSWORD:LocalOnlyDemoAdminPasswordForDocker123!}
app.demo-seed.manager-password=${APP_DEMO_MANAGER_PASSWORD:LocalOnlyDemoManagerPasswordForDocker123!}
app.demo-seed.customer-password=${APP_DEMO_CUSTOMER_PASSWORD:LocalOnlyDemoCustomerPasswordForDocker123!}
