# ===========================================
# Render.com Profile Configuration
# Uses PostgreSQL (Render native database)
# ===========================================

# Database - PostgreSQL (Render)
# Primary: RenderDataSourceConfig.java auto-parses DATABASE_URL env var if present.
# Fallback: If DATABASE_URL is missing, these individual properties are used.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookstore}?sslmode=prefer
spring.datasource.username=${DB_USERNAME:bookstore}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Startup optimization for free-tier cold starts
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred
spring.jmx.enabled=false

# HikariCP - reduced pool for free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=1

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Disable Springdoc on Render to keep startup focused on serving traffic.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging - production level
logging.level.root=INFO
logging.level.com.bookstore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# File upload
spring.servlet.multipart.enabled=true
app.upload.dir=${UPLOAD_DIR:/app/uploads}
app.upload.base-url=${BACKEND_PUBLIC_URL:https://bookstore-api-a1xl.onrender.com}/api/uploads

# Security Headers
server.ssl.enabled=false
server.forward-headers-strategy=native

# Rate Limiting
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.auth-limit=${RATE_LIMIT_AUTH_LIMIT:10}
app.rate-limit.auth-window-ms=60000
app.rate-limit.api-limit=${RATE_LIMIT_API_LIMIT:200}
app.rate-limit.api-window-ms=60000
app.rate-limit.public-limit=${RATE_LIMIT_PUBLIC_LIMIT:500}
app.rate-limit.public-window-ms=60000

# Input Validation
app.input-validation.enabled=true
app.input-validation.max-body-size=10485760
app.input-validation.block-xss=true
app.input-validation.block-sql-injection=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db
management.health.redis.enabled=false
management.health.db.enabled=true
management.health.mail.enabled=false

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:https://bookstore-web-dr1k.onrender.com}

# Email - disabled on Render free tier
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.email.test-endpoint-enabled=false
app.newsletter.enabled=false

# App
app.base-url=${APP_BASE_URL:https://bookstore-web-dr1k.onrender.com}

# Render should boot first, then hydrate demo data in the background
app.demo-seed.enabled=${APP_DEMO_SEED_ENABLED:true}
app.demo-seed.deferred=${APP_DEMO_SEED_DEFERRED:true}

# Grok AI
grok.enabled=${GROK_ENABLED:false}
