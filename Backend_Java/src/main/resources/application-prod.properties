# ===========================================
# Production Profile Configuration
# ===========================================

# Database - uses environment variables (DB_HOST, DB_NAME, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:bookstore}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA - validate schema in production (DDL managed separately)
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# Logging - production level
logging.level.root=INFO
logging.level.com.bookstore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# File upload
spring.servlet.multipart.enabled=true
app.upload.dir=${UPLOAD_DIR:/app/uploads}
app.upload.base-url=${APP_BASE_URL:http://localhost:8080}/api/uploads

# Actuator - expose health for Docker healthcheck
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# CORS - allow frontend
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ===========================================
# Email Configuration (Gmail SMTP)
# ===========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@bookstore.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender
spring.mail.from=${MAIL_FROM:noreply@bookstore.com}

# App base URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ===========================================
# Newsletter & Scheduled Emails Configuration
# ===========================================
# Bật/tắt newsletter
app.newsletter.enabled=${NEWSLETTER_ENABLED:true}
# Cron job: Chạy vào Chủ Nhật hàng tuần lúc 9:00 sáng
app.newsletter.cron=${NEWSLETTER_CRON:0 0 9 ? * SUN}
# Cron job: Nhắc nhở giỏ hàng bị bỏ quên - chạy lúc 18:00 hàng ngày
app.cart-reminder.cron=${CART_REMINDER_CRON:0 0 18 * * ?}
# Cron job: Email chúc mừng sinh nhật - chạy lúc 8:00 hàng ngày
app.birthday-email.cron=${BIRTHDAY_EMAIL_CRON:0 0 8 * * ?}

# ===========================================
# Async Email Configuration
# ===========================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-
