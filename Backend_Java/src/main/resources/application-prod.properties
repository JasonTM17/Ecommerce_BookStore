# ===========================================
# Production Profile Configuration
# ===========================================

# Database - uses environment variables (DB_HOST, DB_NAME, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:bookstore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${DB_USERNAME:bookstore}
spring.datasource.password=${DB_PASSWORD:bookstore123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA - validate schema in production (DDL managed separately)
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# Logging - production level
logging.level.root=INFO
logging.level.com.bookstore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# File upload
spring.servlet.multipart.enabled=true
app.upload.dir=${UPLOAD_DIR:/app/uploads}
app.upload.base-url=${APP_BASE_URL:http://localhost:8080}/api/uploads

# ===========================================
# Production Security Headers
# ===========================================
# Force HTTPS (handled by reverse proxy, but enabled for defense in depth)
server.ssl.enabled=false
server.forward-headers-strategy=native

# ===========================================
# Rate Limiting Configuration (Production)
# ===========================================
app.rate-limit.enabled=true
app.rate-limit.auth-limit=5
app.rate-limit.auth-window-ms=60000
app.rate-limit.api-limit=100
app.rate-limit.api-window-ms=60000
app.rate-limit.public-limit=200
app.rate-limit.public-window-ms=60000

# ===========================================
# Input Validation Configuration (Production)
# ===========================================
app.input-validation.enabled=true
app.input-validation.max-body-size=10485760
app.input-validation.block-xss=true
app.input-validation.block-sql-injection=true

# ===========================================
# Actuator - expose health for Docker healthcheck & monitoring
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=db,mail
management.endpoint.health.group.liveness.include=ping
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.health.redis.enabled=true
management.health.db.enabled=true

# CORS - allow frontend
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ===========================================
# Email Configuration (Gmail SMTP)
# ===========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@bookstore.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender
spring.mail.from=${MAIL_FROM:noreply@bookstore.com}

# App base URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ===========================================
# Email Test Endpoints (Production - DISABLED!)
# ===========================================
app.email.test-endpoint-enabled=${APP_EMAIL_TEST_ENABLED:false}
app.email.allowed-test-recipients=${APP_EMAIL_ALLOWED_RECIPIENTS:}

# ===========================================
# Newsletter & Scheduled Emails Configuration
# ===========================================
# Bật/tắt newsletter
app.newsletter.enabled=${NEWSLETTER_ENABLED:true}
# Cron job: Chạy vào Chủ Nhật hàng tuần lúc 9:00 sáng
app.newsletter.cron=${NEWSLETTER_CRON:0 0 9 ? * SUN}
# Cron job: Nhắc nhở giỏ hàng bị bỏ quên - chạy lúc 18:00 hàng ngày
app.cart-reminder.cron=${CART_REMINDER_CRON:0 0 18 * * ?}
# Cron job: Email chúc mừng sinh nhật - chạy lúc 8:00 hàng ngày
app.birthday-email.cron=${BIRTHDAY_EMAIL_CRON:0 0 8 * * ?}

# ===========================================
# Async Email Configuration
# ===========================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-
