# ===========================================
# Server Configuration
# ===========================================
server.port=8080
server.servlet.context-path=/api

# ===========================================
# Application Name
# ===========================================
spring.application.name=Ecommerce-BookStore

# ===========================================
# PostgreSQL Database Configuration
# ===========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookstore}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ===========================================
# File Upload Configuration
# ===========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.base-url=${APP_BASE_URL:http://localhost:8080}/api/uploads

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong!}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===========================================
# Frontend URL (for CORS)
# ===========================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ===========================================
# Email Configuration (Optional)
# ===========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@bookstore.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App Base URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ===========================================
# Email Test Endpoints (Disable in production!)
# ===========================================
app.email.test-endpoint-enabled=${APP_EMAIL_TEST_ENABLED:false}
app.email.allowed-test-recipients=${APP_EMAIL_ALLOWED_RECIPIENTS:}

# ===========================================
# Newsletter & Scheduled Emails
# ===========================================
app.newsletter.enabled=${NEWSLETTER_ENABLED:true}
app.newsletter.cron=${NEWSLETTER_CRON:0 0 9 ? * SUN}
app.cart-reminder.cron=${CART_REMINDER_CRON:0 0 18 * * ?}
app.birthday-email.cron=${BIRTHDAY_EMAIL_CRON:0 0 8 * * ?}

# ===========================================
# Logging Configuration
# ===========================================
logging.level.root=INFO
logging.level.com.bookstore=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/bookstore.log

# ===========================================
# Swagger / OpenAPI Configuration
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.enable-spring-security=true

# ===========================================
# Cache Configuration
# ===========================================
spring.cache.type=simple
spring.cache.cache-names=products,categories,users

# ===========================================
# Actuator Configuration
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
