# ===========================================
# Email Configuration (Production)
# ===========================================
# Gmail SMTP Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@bookstore.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:noreply@bookstore.com}

# SMTP Security Settings
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.retry=false

# Async Configuration for Email
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-

# App base URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Email sender name
app.email.sender-name=BookStore Team
