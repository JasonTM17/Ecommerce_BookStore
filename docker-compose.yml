version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.4
    container_name: bookstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: bookstore
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bookstore-network

  # PostgreSQL for specific services (optional)
  postgres:
    image: postgres:16-alpine
    container_name: bookstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookstore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bookstore-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bookstore-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # MySQL (primary)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bookstore
      DB_USERNAME: bookstore
      DB_PASSWORD: bookstore123
      # PostgreSQL (optional, for specific features)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bookstore
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres123
      JWT_SECRET: YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong!
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      JPA_DDL_AUTO: update
      APP_BASE_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_AUTH_LIMIT: "5"
      RATE_LIMIT_API_LIMIT: "100"
      RATE_LIMIT_PUBLIC_LIMIT: "200"
      # Input Validation
      INPUT_VALIDATION_ENABLED: "true"
      INPUT_VALIDATION_BLOCK_XSS: "true"
      INPUT_VALIDATION_BLOCK_SQL_INJECTION: "true"
      # Email (cấu hình trong .env)
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-xiaozhongli1710@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-ebze tvdw nxfy xnur}
      MAIL_FROM: ${MAIL_FROM:-noreply@bookstore.com}
      APP_EMAIL_TEST_ENABLED: "true"
      APP_EMAIL_ALLOWED_RECIPIENTS: "jasonbmt06@gmail.com,xiaozhongli1710@gmail.com"
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bookstore-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bookstore-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_APP_NAME: BookStore
      NEXT_PUBLIC_APP_DESCRIPTION: Professional Vietnamese E-Commerce BookStore Platform
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bookstore-network

volumes:
  mysql_data:
  postgres_data:
  uploads_data:

networks:
  bookstore-network:
    driver: bridge
